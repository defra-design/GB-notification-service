name: Journey demo

# Records the notification-journey walk-throughs and publishes the HTML report
# (with videos) to GitHub Pages. Each run REPLACES the previous report — the
# gh-pages branch is force-orphaned to a single commit, so it never grows.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # peaceiris needs this to push the gh-pages branch

concurrency:
  group: journey-demo-pages
  cancel-in-progress: false

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install the browser
        run: npx playwright install --with-deps chromium

      - name: Record the walk-throughs
        run: npm run test:prototype

      - name: Publish the latest report to GitHub Pages
        if: ${{ !cancelled() }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./journey-demo/playwright-report
          # Replace everything each run so gh-pages stays a single, tiny commit.
          force_orphan: true
