name: Journey demo

# Records the notification-journey walk-throughs and uploads the HTML report
# (with the videos and traces bundled in) as a downloadable artefact on the run.
# Artefacts auto-expire, so nothing accumulates — no gh-pages branch, no admin
# or Pages setup needed.

on:
  push:
    # TEMPORARY: feat/playwright-demo-flow is here so the pipeline runs on the
    # branch while we get it green. Revert to [main] before merging.
    branches: [main, feat/playwright-demo-flow]
  workflow_dispatch:

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install the browser
        run: npx playwright install --with-deps chromium

      - name: Record the walk-throughs
        run: npm run test:prototype

      - name: Upload the report (HTML + videos + traces)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: journey-demo-report
          path: journey-demo/playwright-report
          retention-days: 14
